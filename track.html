<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#0f0f11"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="75 Hard"/>
<link rel="manifest" href="manifest.json"/>
<!-- Apple touch icons (generate these from your icon) -->
<link rel="apple-touch-icon" href="icons/icon-192.png"/>
<title>75 Hard</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f0f11;--bg2:#1a1a1f;--bg3:#242429;--bg4:#2e2e35;
  --txt:#f0f0f5;--txt2:#a0a0b0;--txt3:#606070;
  --accent:#7c6cfc;--accent2:#a598fd;--accentbg:rgba(124,108,252,0.15);
  --green:#4ade80;--greenbg:rgba(74,222,128,0.12);
  --red:#f87171;--redbg:rgba(248,113,113,0.12);
  --amber:#fbbf24;--amberbg:rgba(251,191,36,0.12);
  --blue:#60a5fa;--bluebg:rgba(96,165,250,0.12);
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --r:14px;--r2:10px;--r3:20px;
}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',system-ui,sans-serif;overflow:hidden}
#app{height:100dvh;display:flex;flex-direction:column;max-width:430px;margin:0 auto;position:relative}
#nav{display:flex;background:rgba(15,15,17,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);padding:8px 0 max(8px,env(safe-area-inset-bottom));flex-shrink:0;z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 4px;border:none;background:none;color:var(--txt3);cursor:pointer;transition:color .2s;font-size:10px;font-weight:500;letter-spacing:0.3px}
.nav-btn.active{color:var(--accent)}
.nav-btn i{font-size:22px}
#pages{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;overflow-y:auto;transition:opacity .25s,transform .25s;opacity:0;pointer-events:none;transform:translateY(8px)}
.page.active{opacity:1;pointer-events:all;transform:translateY(0)}
.page-inner{padding:20px 16px 24px;min-height:100%}
h1{font-size:28px;font-weight:700;letter-spacing:-0.5px}
h2{font-size:20px;font-weight:600;letter-spacing:-0.3px}
h3{font-size:15px;font-weight:600}
.muted{color:var(--txt2)}
.smuted{color:var(--txt3);font-size:12px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px}
.card.glow{border-color:rgba(124,108,252,0.3);box-shadow:0 0 24px rgba(124,108,252,0.08)}
.ring-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;padding:8px 0}
.ring-track{fill:none;stroke:var(--bg3);stroke-width:10}
.ring-fill{fill:none;stroke:var(--accent);stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset .6s cubic-bezier(.4,0,.2,1)}
.ring-label{text-anchor:middle;dominant-baseline:central;font-size:28px;font-weight:700;fill:var(--txt)}
.ring-sub{text-anchor:middle;dominant-baseline:central;font-size:13px;fill:var(--txt2)}
.task-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .2s;user-select:none}
.task-card.done{border-color:rgba(74,222,128,0.25);background:rgba(74,222,128,0.04)}
.task-card:active{transform:scale(0.98)}
.task-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.task-icon i{font-size:22px}
.task-body{flex:1;min-width:0}
.task-name{font-size:14px;font-weight:600;margin-bottom:2px}
.task-desc{font-size:12px;color:var(--txt3)}
.task-time{font-size:11px;color:var(--green);margin-top:2px}
.task-check{width:26px;height:26px;border-radius:50%;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .25s}
.task-card.done .task-check{background:var(--green);border-color:var(--green)}
.task-card.done .task-check i{color:var(--bg);font-size:14px}
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:14px;text-align:center}
.stat-num{font-size:26px;font-weight:700;line-height:1;margin-bottom:4px}
.stat-lbl{font-size:11px;color:var(--txt3);letter-spacing:0.4px;text-transform:uppercase}
.quote-card{background:var(--accentbg);border:1px solid rgba(124,108,252,0.2);border-radius:var(--r);padding:18px;margin-bottom:16px}
.quote-text{font-size:15px;font-style:italic;line-height:1.6;color:var(--accent2);margin-bottom:8px}
.quote-author{font-size:12px;color:var(--txt3)}
.water-visual{height:120px;background:var(--bg3);border-radius:var(--r2);overflow:hidden;position:relative;margin:12px 0}
.water-fill{position:absolute;bottom:0;left:0;right:0;background:#1d6aff;transition:height .5s cubic-bezier(.4,0,.2,1);opacity:0.6}
.water-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:white}
.quick-btns{display:flex;gap:8px;flex-wrap:wrap}
.qbtn{flex:1;min-width:60px;padding:10px 8px;border:1px solid var(--border2);background:var(--bg3);color:var(--txt);border-radius:var(--r2);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;text-align:center}
.qbtn:active{transform:scale(0.95);background:var(--accentbg)}
.pbar-wrap{background:var(--bg3);border-radius:99px;height:8px;overflow:hidden;margin:8px 0}
.pbar-fill{height:100%;border-radius:99px;transition:width .4s ease;background:var(--accent)}
.pbar-fill.green{background:var(--green)}
.pbar-fill.blue{background:var(--blue)}
.journal-textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);color:var(--txt);font-size:14px;padding:12px;resize:none;font-family:inherit;line-height:1.5}
.journal-textarea:focus{outline:none;border-color:var(--accent)}
.mood-row{display:flex;gap:6px;flex-wrap:wrap}
.mood-btn{display:flex;align-items:center;gap:6px;padding:8px 12px;border:1px solid var(--border);background:var(--bg3);color:var(--txt2);border-radius:99px;font-size:12px;cursor:pointer;transition:all .15s}
.mood-btn i{font-size:16px}
.mood-btn.active{border-color:var(--accent);background:var(--accentbg);color:var(--accent2)}
.chart-bar-wrap{display:flex;align-items:flex-end;gap:4px;height:80px;margin:12px 0}
.cbar{flex:1;background:var(--accent);border-radius:4px 4px 0 0;min-width:0;opacity:0.7;transition:height .4s;cursor:pointer}
.cbar:hover{opacity:1}
.cbar.today{opacity:1}
.badges-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.badge{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:14px 10px;text-align:center;transition:all .2s}
.badge.unlocked{border-color:rgba(251,191,36,0.3);background:var(--amberbg)}
.badge-icon{font-size:26px;margin-bottom:6px;display:flex;justify-content:center}
.badge-icon i{font-size:28px}
.badge.unlocked .badge-icon i{color:var(--amber)}
.badge:not(.unlocked) .badge-icon i{color:var(--txt3);opacity:0.35}
.badge-name{font-size:11px;font-weight:600;color:var(--txt2)}
.badge-day{font-size:10px;color:var(--txt3);margin-top:2px}
.fail-card{background:var(--redbg);border:1px solid rgba(248,113,113,0.25);border-radius:var(--r);padding:18px;margin-bottom:12px}
.consequence-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.consequence-item:last-child{border-bottom:none}
.consequence-item i{font-size:20px;color:var(--red);flex-shrink:0}
.section-head{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--txt3);margin:20px 0 10px;display:flex;align-items:center;gap:6px}
.section-head i{font-size:14px}
.section-head:first-child{margin-top:0}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .25s}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border-radius:24px 24px 0 0;padding:20px;width:100%;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);max-height:85dvh;overflow-y:auto}
.overlay.open .modal{transform:translateY(0)}
.modal-handle{width:36px;height:4px;background:var(--bg4);border-radius:99px;margin:0 auto 18px}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;border-radius:var(--r2);font-size:15px;font-weight:600;cursor:pointer;border:none;width:100%;transition:all .15s}
.btn i{font-size:18px}
.btn:active{transform:scale(0.97)}
.btn-primary{background:var(--accent);color:white}
.btn-danger{background:var(--redbg);border:1px solid rgba(248,113,113,0.3);color:var(--red)}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--txt)}
.input{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);color:var(--txt);font-size:15px;padding:12px 14px;width:100%;font-family:inherit}
.input:focus{outline:none;border-color:var(--accent)}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
.pop{animation:pop .3s ease}
.photo-zone{border:2px dashed var(--border2);border-radius:var(--r);height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;color:var(--txt3);transition:all .2s}
.photo-zone i{font-size:36px}
.photo-zone:hover{border-color:var(--accent);color:var(--accent2);background:var(--accentbg)}
.photo-strip{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-top:8px}
.photo-thumb{width:80px;height:80px;border-radius:var(--r2);object-fit:cover;flex-shrink:0;border:2px solid var(--border)}
.chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:99px;font-size:11px;font-weight:600;letter-spacing:0.3px}
.chip i{font-size:13px}
.chip.green{background:var(--greenbg);color:var(--green)}
.chip.amber{background:var(--amberbg);color:var(--amber)}
.chip.red{background:var(--redbg);color:var(--red)}
.chip.blue{background:var(--bluebg);color:var(--blue)}
</style>
</head>
<body>
<div id="app">
  <div id="pages">
    <div class="page active" id="p-home"><div class="page-inner" id="home-content"></div></div>
    <div class="page" id="p-tasks"><div class="page-inner" id="tasks-content"></div></div>
    <div class="page" id="p-log"><div class="page-inner" id="log-content"></div></div>
    <div class="page" id="p-stats"><div class="page-inner" id="stats-content"></div></div>
    <div class="page" id="p-settings"><div class="page-inner" id="settings-content"></div></div>
  </div>
  <nav id="nav">
    <button class="nav-btn active" data-page="home" onclick="nav('home')">
      <i class="ti ti-home"></i>Today
    </button>
    <button class="nav-btn" data-page="tasks" onclick="nav('tasks')">
      <i class="ti ti-checklist"></i>Tasks
    </button>
    <button class="nav-btn" data-page="log" onclick="nav('log')">
      <i class="ti ti-notebook"></i>Journal
    </button>
    <button class="nav-btn" data-page="stats" onclick="nav('stats')">
      <i class="ti ti-chart-bar"></i>Stats
    </button>
    <button class="nav-btn" data-page="settings" onclick="nav('settings')">
      <i class="ti ti-settings"></i>Settings
    </button>
  </nav>
</div>
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div id="modal-body"></div>
  </div>
</div>
<input type="file" id="photo-input" accept="image/*" capture="environment" style="display:none" onchange="handlePhoto(event)"/>

<script>
const STORAGE_KEY='75hard_v2';
const TASKS_DEF=[
  {id:'w1',icon:'ti-barbell',name:'Workout 1',desc:'45 min — tap the sun to mark as outdoor',color:'#7c6cfc',hasOutdoor:true},
  {id:'w2',icon:'ti-bike',name:'Workout 2',desc:'45 min — must differ from workout 1',color:'#a598fd',hasOutdoor:true},
  {id:'water',icon:'ti-droplet',name:'Drink 1 Gallon',desc:'~3.8 litres of water',color:'#38bdf8'},
  {id:'read',icon:'ti-book',name:'Read 10 Pages',desc:'Non-fiction only',color:'#4ade80'},
  {id:'photo',icon:'ti-camera',name:'Progress Photo',desc:'Front, side, or back',color:'#fbbf24'},
  {id:'diet',icon:'ti-salad',name:'Follow Diet',desc:'No cheat meals, no alcohol',color:'#f472b6'},
];
const QUOTES=[
  {text:"The only easy day was yesterday.",author:"Navy SEALs"},
  {text:"Discipline equals freedom.",author:"Jocko Willink"},
  {text:"Hard times create strong men.",author:"G. Michael Hopf"},
  {text:"Don't stop when you're tired. Stop when you're done.",author:"David Goggins"},
  {text:"The pain you feel today will be the strength you feel tomorrow.",author:"Arnold Schwarzenegger"},
  {text:"You don't have to be great to start, but you have to start to be great.",author:"Zig Ziglar"},
  {text:"Suffer the pain of discipline or suffer the pain of regret.",author:"Jim Rohn"},
];

function defaultState(){
  return {
    startDate:null,days:{},
    consequences:[
      {id:'c1',text:'₹500 donation to a cause you dislike',icon:'ti-coin'},
      {id:'c2',text:'Extra 45 min outdoor run next day',icon:'ti-run'},
      {id:'c3',text:'No screen time after 8 PM for a week',icon:'ti-device-mobile-off'},
    ],
    settings:{name:'Warrior',notifWater:true,notifPhoto:true,notifEvening:true},
  };
}

let S=(()=>{ try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||defaultState();}catch{return defaultState();} })();
function save(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(S));}catch{}}
function today(){return new Date().toISOString().slice(0,10);}
function dayNum(){
  if(!S.startDate)return 0;
  const d=Math.floor((new Date(today())-new Date(S.startDate))/86400000)+1;
  return Math.min(Math.max(d,1),75);
}
function dayData(key){if(!S.days[key])S.days[key]={tasks:{},water:0,pages:0,journal:'',wins:'',struggles:'',mood:0,energy:0,photos:[]};return S.days[key];}
function todayData(){return dayData(today());}
function outdoorDone(dd){return !!(dd.outdoor_w1||dd.outdoor_w2);}
function completedCount(dd){
  let n=TASKS_DEF.filter(t=>dd.tasks[t.id]).length;
  if(!outdoorDone(dd)) n=Math.max(n-1,0);
  return n;
}
function allDone(dd){return TASKS_DEF.every(t=>dd.tasks[t.id])&&outdoorDone(dd);}
function pct(dd){return Math.round(completedCount(dd)/TASKS_DEF.length*100);}
function streak(){
  let s=0,d=new Date(today());
  while(true){const k=d.toISOString().slice(0,10);const dd=S.days[k];if(!dd||!allDone(dd))break;s++;d.setDate(d.getDate()-1);}
  return s;
}

let curPage='home';
function nav(pg){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.page===pg));
  document.getElementById('p-'+pg).classList.add('active');
  curPage=pg;render[pg]();
}
function openModal(html){document.getElementById('modal-body').innerHTML=html;document.getElementById('overlay').classList.add('open');}
function closeModal(e){if(e.target===document.getElementById('overlay'))document.getElementById('overlay').classList.remove('open');}
function forceClose(){document.getElementById('overlay').classList.remove('open');}

const render={};

render.home=function(){
  const dd=todayData(),done=completedCount(dd),total=TASKS_DEF.length,prog=done/total;
  const R=54,C=2*Math.PI*R,dash=C*(1-prog),dn=dayNum(),q=QUOTES[(dn||1)%QUOTES.length],str=streak();
  if(!S.startDate){
    document.getElementById('home-content').innerHTML=`
      <div style="text-align:center;padding:60px 20px 40px">
        <i class="ti ti-bolt" style="font-size:64px;color:var(--accent);display:block;margin-bottom:16px"></i>
        <h1 style="font-size:32px;margin-bottom:8px">75 Hard</h1>
        <p class="muted" style="margin-bottom:32px;font-size:15px;line-height:1.6">The hardest mental toughness program ever devised.<br>No substitutions. No modifications. No excuses.</p>
        <div class="card" style="margin-bottom:24px;text-align:left">
          <div class="section-head"><i class="ti ti-user"></i>Your Name</div>
          <input class="input" id="uname" placeholder="Enter your name" value="${S.settings.name||''}"/>
          <div class="section-head" style="margin-top:16px"><i class="ti ti-calendar"></i>Start Date</div>
          <input class="input" id="sdate" type="date" value="${today()}" style="margin-top:4px"/>
        </div>
        <button class="btn btn-primary" onclick="startChallenge()"><i class="ti ti-rocket"></i>Begin 75 Hard</button>
        <p style="font-size:12px;color:var(--txt3);margin-top:16px;line-height:1.5">Once you start, missing any task means restarting from Day 1.<br>No exceptions. That's the point.</p>
      </div>`;
    return;
  }
  const remaining=TASKS_DEF.filter(t=>!dd.tasks[t.id]);
  let remHtml=remaining.slice(0,3).map(t=>`
    <div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)">
      <i class="ti ${t.icon}" style="font-size:18px;color:var(--txt3);width:20px;text-align:center"></i>
      <span style="font-size:13px;color:var(--txt2)">${t.name}</span>
    </div>`).join('');
  if(remaining.length>3)remHtml+=`<div style="font-size:12px;color:var(--txt3);padding:8px 0">+${remaining.length-3} more tasks</div>`;
  document.getElementById('home-content').innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
      <div><h1 style="font-size:24px">Day ${dn}</h1><p class="smuted">${75-dn} days remaining</p></div>
      <span class="chip ${str>0?'green':'amber'}">${str>0?`<i class="ti ti-flame"></i>${str} day streak`:'<i class="ti ti-flame"></i>Start streak'}</span>
    </div>
    <div class="ring-wrap">
      <svg width="130" height="130" viewBox="0 0 130 130">
        <circle class="ring-track" cx="65" cy="65" r="${R}" transform="rotate(-90 65 65)"/>
        <circle class="ring-fill" cx="65" cy="65" r="${R}" stroke-dasharray="${C}" stroke-dashoffset="${dash}" transform="rotate(-90 65 65)"/>
        <text class="ring-label" x="65" y="60">${done}/${total}</text>
        <text class="ring-sub" x="65" y="82">${prog===1?'COMPLETE':pct(dd)+'% done'}</text>
      </svg>
    </div>
    <div class="stat-row">
      <div class="stat-box"><div class="stat-num" style="color:var(--accent)">${dn}</div><div class="stat-lbl">Day</div></div>
      <div class="stat-box"><div class="stat-num" style="color:var(--green)">${Math.round(pct(dd))}%</div><div class="stat-lbl">Today</div></div>
    </div>
    <div class="quote-card">
      <div style="display:flex;gap:10px;align-items:flex-start">
        <i class="ti ti-quote" style="font-size:20px;color:var(--accent);flex-shrink:0;margin-top:2px"></i>
        <div><div class="quote-text">${q.text}</div><div class="quote-author">— ${q.author}</div></div>
      </div>
    </div>
    ${remaining.length===0?`
    <div class="card glow" style="text-align:center;padding:20px">
      <i class="ti ti-trophy" style="font-size:40px;color:var(--amber);display:block;margin-bottom:8px"></i>
      <h3 style="color:var(--green);margin-bottom:4px">Day ${dn} Complete!</h3>
      <p class="smuted">You crushed it. Rest up for tomorrow.</p>
    </div>`:`
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <h3>Still to do</h3>
        <button class="btn btn-outline" style="width:auto;padding:6px 14px;font-size:12px" onclick="nav('tasks')">All Tasks <i class="ti ti-arrow-right" style="font-size:13px"></i></button>
      </div>
      ${remHtml}
    </div>`}
    <div style="margin-top:12px">
      <div class="section-head"><i class="ti ti-chart-line"></i>75-Day Progress</div>
      <div class="pbar-wrap"><div class="pbar-fill" style="width:${(dn/75*100).toFixed(1)}%"></div></div>
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--txt3);margin-top:4px"><span>Day 1</span><span>Day 75</span></div>
    </div>`;
};

render.tasks=function(){
  const dd=todayData(),dn=dayNum(),done=completedCount(dd);
  const outdoorOk=outdoorDone(dd);
  const taskCards=TASKS_DEF.map(t=>{
    const isDone=!!dd.tasks[t.id],ts=dd.tasks[t.id];
    const isOutdoor=t.id==='w1'?!!dd.outdoor_w1:t.id==='w2'?!!dd.outdoor_w2:false;

function startChallenge(){
  const name=document.getElementById('uname')?.value||'Warrior';
  const sdate=document.getElementById('sdate')?.value||today();
  S.settings.name=name;S.startDate=sdate;save();render.home();
}
function toggleTask(id){
  const dd=todayData();
  if(dd.tasks[id]){delete dd.tasks[id];}
  else{dd.tasks[id]=new Date().toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'});}
  save();
  const el=document.getElementById('task-'+id);
  if(el){el.classList.add('pop');setTimeout(()=>el.classList.remove('pop'),300);}
  if(curPage==='tasks')render.tasks();else if(curPage==='home')render.home();
}
function toggleOutdoor(id){
  const dd=todayData();
  if(id==='w1') dd.outdoor_w1=!dd.outdoor_w1;
  else if(id==='w2') dd.outdoor_w2=!dd.outdoor_w2;
  save();render.tasks();if(curPage==='home')render.home();
}
function addWater(ml){
  const dd=todayData();dd.water=Math.min((dd.water||0)+ml,5000);
  if(dd.water>=3800&&!dd.tasks['water']){dd.tasks['water']=new Date().toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'});showToast('Water goal reached');}
  save();render.tasks();
}
function resetWater(){const dd=todayData();dd.water=0;delete dd.tasks['water'];save();render.tasks();}
function addPages(n){
  const dd=todayData();dd.pages=Math.min((dd.pages||0)+n,999);
  if(dd.pages>=10&&!dd.tasks['read']){dd.tasks['read']=new Date().toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'});showToast('Reading goal reached');}
  save();render.tasks();
}
function setPages(n){const dd=todayData();dd.pages=n;if(n<10)delete dd.tasks['read'];save();render.tasks();}
function setMood(n){todayData().mood=n;save();render.log();}
function setEnergy(n){todayData().energy=n;save();render.log();}
function saveJournal(){
  const dd=todayData();
  const jta=document.getElementById('journal-ta'),wta=document.getElementById('wins-ta'),sta=document.getElementById('struggles-ta');
  if(jta)dd.journal=jta.value;if(wta)dd.wins=wta.value;if(sta)dd.struggles=sta.value;save();
}
function handlePhoto(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const dd=todayData();if(!dd.photos)dd.photos=[];dd.photos.push(ev.target.result);
    if(!dd.tasks['photo']){dd.tasks['photo']=new Date().toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'});showToast('Progress photo saved');}
    save();if(curPage==='tasks')render.tasks();
  };
  reader.readAsDataURL(file);e.target.value='';
}
function showPhoto(src){
  openModal(`<div style="text-align:center">
    <h3 style="margin-bottom:12px">Progress Photo</h3>
    <img src="${src}" style="width:100%;border-radius:var(--r);max-height:60dvh;object-fit:contain"/>
    <button class="btn btn-outline" style="margin-top:12px" onclick="forceClose()">Close</button>
  </div>`);
}
function showEntry(k){
  const d=S.days[k],dn2=S.startDate?Math.floor((new Date(k)-new Date(S.startDate))/86400000)+1:1;

      ${d.mood?`<span class="chip green"><i class="ti ti-mood-smile"></i>Mood ${d.mood}/5</span>`:''}
      ${d.energy?`<span class="chip blue"><i class="ti ti-bolt"></i>Energy ${d.energy}/5</span>`:''}

    ${d.wins?`<div class="section-head"><i class="ti ti-trophy"></i>Wins</div><p style="font-size:14px;color:var(--txt2);line-height:1.5">${d.wins}</p>`:''}
    ${d.struggles?`<div class="section-head" style="margin-top:10px"><i class="ti ti-brain"></i>Struggles</div><p style="font-size:14px;color:var(--txt2);line-height:1.5">${d.struggles}</p>`:''}

function confirmReset(){
  openModal(`
    <div style="text-align:center;padding:10px">
      <i class="ti ti-mood-sad" style="font-size:56px;color:var(--red);display:block;margin-bottom:12px"></i>
      <h3 style="margin-bottom:8px;color:var(--red)">Restart Challenge?</h3>
      <p style="font-size:14px;color:var(--txt2);line-height:1.5;margin-bottom:20px">You're on Day ${dayNum()}. Restarting means you missed a task — the consequences apply.</p>
      <div class="fail-card" style="margin-bottom:16px;text-align:left">
        <div style="font-size:12px;font-weight:600;color:var(--red);margin-bottom:8px;display:flex;align-items:center;gap:6px"><i class="ti ti-alert-triangle"></i>Your Consequences</div>
        ${S.consequences.map(c=>`<div style="display:flex;gap:8px;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px">
          <i class="ti ${c.icon}" style="color:var(--red);font-size:18px"></i><span style="color:var(--txt2)">${c.text}</span>
        </div>`).join('')}
      </div>
      <button class="btn btn-danger" style="margin-bottom:8px" onclick="doReset()"><i class="ti ti-refresh"></i>I Accept — Restart from Day 1</button>
      <button class="btn btn-outline" onclick="forceClose()"><i class="ti ti-arrow-left"></i>Continue Challenge</button>
    </div>`);
}
function doReset(){S.startDate=today();S.days={};save();forceClose();showToast('Challenge restarted. Honor your consequences.');render.home();}
function confirmWipe(){
  openModal(`
    <div style="text-align:center;padding:10px">
      <i class="ti ti-trash" style="font-size:56px;color:var(--red);display:block;margin-bottom:12px"></i>
      <h3 style="color:var(--red);margin-bottom:8px">Erase All Data?</h3>
      <p class="muted" style="margin-bottom:20px;font-size:14px">This deletes everything permanently.</p>
      <button class="btn btn-danger" style="margin-bottom:8px" onclick="doWipe()"><i class="ti ti-trash"></i>Yes, Delete Everything</button>
      <button class="btn btn-outline" onclick="forceClose()">Cancel</button>
    </div>`);
}
function doWipe(){S=defaultState();save();forceClose();render.home();}
function getToken(){if(!S._token){S._token='75H-'+Math.random().toString(36).slice(2,10).toUpperCase();save();}return S._token;}
function copyToken(){navigator.clipboard?.writeText(getToken()).then(()=>showToast('Token copied'));}
function copyStartCmd(){navigator.clipboard?.writeText('/start '+getToken()).then(()=>showToast('Command copied 2014 paste it in Telegram!'));}
function editConsequence(i){
  const c=S.consequences[i];
  openModal(`
    <h3 style="margin-bottom:12px">Edit Consequence</h3>
    <div style="margin-bottom:10px"><label class="smuted">Tabler icon name (e.g. ti-coin)</label>
      <input class="input" id="ci" value="${c.icon}" style="margin-top:6px"/></div>
    <div style="margin-bottom:16px"><label class="smuted">Description</label>
      <input class="input" id="ct" value="${c.text}" style="margin-top:6px"/></div>
    <button class="btn btn-primary" onclick="saveConsequence(${i})"><i class="ti ti-device-floppy"></i>Save</button>
    <button class="btn btn-danger" style="margin-top:8px" onclick="deleteConsequence(${i})"><i class="ti ti-trash"></i>Delete</button>
    <button class="btn btn-outline" style="margin-top:8px" onclick="forceClose()">Cancel</button>`);
}
function saveConsequence(i){S.consequences[i].icon=document.getElementById('ci').value;S.consequences[i].text=document.getElementById('ct').value;save();forceClose();render.settings();}
function deleteConsequence(i){S.consequences.splice(i,1);save();forceClose();render.settings();}
function addConsequence(){S.consequences.push({id:'c'+Date.now(),text:'New consequence',icon:'ti-alert-circle'});save();render.settings();editConsequence(S.consequences.length-1);}

let toastT;
function showToast(msg){
  let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';
    t.style.cssText='position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--bg3);border:1px solid var(--border2);color:var(--txt);padding:10px 18px;border-radius:99px;font-size:13px;font-weight:600;z-index:300;transition:all .25s;opacity:0;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center';
    document.body.appendChild(t);}
  t.textContent=msg;clearTimeout(toastT);
  requestAnimationFrame(()=>{t.style.opacity='1';t.style.transform='translateX(-50%) translateY(0)';});
  toastT=setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(-50%) translateY(10px)';},2500);
}

render.home();

// ── PWA: register service worker ──────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .then(reg => console.log('[SW] registered, scope:', reg.scope))
      .catch(err => console.warn('[SW] registration failed:', err));
  });
}
</script>
</body>
</html>
