<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#0d1a0d"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<link rel="apple-touch-icon" href="icons/icon-192.png"/>
<link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192.png"/>
<title>75 Hard</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#000000;
  --bg2:#080808;
  --bg3:#0f140f;
  --bg4:#141a14;
  --bg5:#1a221a;
  --txt:#d0cfde;
  --txt2:#7f868e;
  --txt3:#37532a;
  --neon:#c0f631;
  --neon2:#bff834;
  --neonbg:rgba(192,246,49,0.08);
  --neonborder:rgba(192,246,49,0.3);
  --neonborderlo:rgba(192,246,49,0.15);
  --amber:#eb8939;
  --amberbg:rgba(235,137,57,0.12);
  --red:#eb8939;
  --redbg:rgba(235,137,57,0.08);
  --redborder:rgba(235,137,57,0.25);
  --blue:#1db588;
  --border:rgba(192,246,49,0.07);
  --border2:rgba(192,246,49,0.13);
  --r:14px;--r2:10px;
  /* progress palette */
  --p-lime:#c7ff33;
  --p-green:#84bc39;
  --p-bg:#0b0f08;
  --p-card:#1b2610;
  --p-mid:#334d2a;
  --p-teal:#21b788;
  --p-orange:#de8236;
  --p-muted:#6f7680;
}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',system-ui,sans-serif;overflow:hidden}

/* ── PWA FIX: push content below notch/Dynamic Island ── */
#app{
  height:100dvh;
  /* iOS PWA fallback */
  display:flex;
  flex-direction:column;
  max-width:430px;
  margin:0 auto;
  position:relative;
  padding-top:env(safe-area-inset-top);
}

/* NAV — flush at bottom, clears home indicator */
#nav{
  display:flex;
  background:#000;
  border-top:1px solid var(--border2);
  padding-top:8px;
  padding-bottom:calc(8px + env(safe-area-inset-bottom));
}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 4px;border:none;background:none;color:var(--txt3);cursor:pointer;transition:color .2s;font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase}
.nav-btn.active{color:var(--neon)}
.nav-btn i{font-size:20px}
/* PAGES */
#pages{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;overflow-y:auto;transition:opacity .2s,transform .2s;opacity:0;pointer-events:none;transform:translateY(6px)}
.page.active{opacity:1;pointer-events:all;transform:translateY(0)}
.page-inner{padding:20px 16px 32px;min-height:100%}
/* CARDS */
.card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px}
/* TASK CARDS */
.task-card{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:16px 14px;margin-bottom:10px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .18s;user-select:none}
.task-card.done{border-color:var(--neonborder);background:rgba(192,246,49,0.04)}
.task-card:active{transform:scale(0.985)}
.task-chk{width:40px;height:40px;border-radius:10px;border:2px solid var(--neonborder);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;background:transparent}
.task-card.done .task-chk{background:var(--neon);border-color:var(--neon)}
.task-card.done .task-chk i{color:var(--bg);font-size:20px}
.task-body{flex:1;min-width:0}
.task-name{font-size:14px;font-weight:900;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:3px;color:var(--txt)}
.task-card.done .task-name{opacity:0.4;text-decoration:line-through}
.task-desc{font-size:12px;color:var(--txt2);font-weight:500}
.task-time{font-size:10px;color:var(--neon);margin-top:3px;display:flex;align-items:center;gap:3px;font-weight:700}
/* PILL */
.pill{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:6px;font-size:11px;font-weight:800;letter-spacing:0.5px;text-transform:uppercase;border:2px solid;flex-shrink:0}
.pill-neon{background:transparent;color:var(--neon);border-color:var(--neonborder)}
.pill-blue{background:rgba(29,181,136,0.1);color:var(--blue);border-color:rgba(29,181,136,0.35)}
.pill-dim{background:var(--bg4);color:var(--txt3);border-color:var(--border2)}
.pill-red{background:var(--redbg);color:var(--red);border-color:var(--redborder)}
/* PROGRESS BAR */
.pbar-wrap{background:var(--bg5);border-radius:99px;height:5px;overflow:hidden;margin:6px 0}
.pbar-fill{height:100%;border-radius:99px;transition:width .4s ease;background:var(--neon)}
/* STAT BOX */
.stat-box{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:16px;text-align:center}
.stat-box.active{border-color:var(--neonborder);border-width:2px}
.stat-num{font-size:32px;font-weight:900;line-height:1;margin-bottom:4px;font-variant-numeric:tabular-nums}
.stat-lbl{font-size:9px;color:var(--txt3);letter-spacing:1.5px;text-transform:uppercase;font-weight:800}
/* WALL */
.wall-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:5px;margin:10px 0}
.wall-cell{aspect-ratio:1;border-radius:7px;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;transition:all .2s;color:var(--bg)}
.wall-cell.done{background:var(--p-lime)}
.wall-cell.today{background:transparent;border:2px solid var(--p-lime);color:var(--p-lime)}
.wall-cell.missed{background:rgba(222,130,54,0.15);border:1px solid rgba(222,130,54,0.3);color:var(--p-orange)}
.wall-cell.future{background:var(--bg4);border:1px solid var(--border);color:transparent}
/* AGGREGATES */
.agg-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.agg-box{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:13px}
.agg-icon{font-size:10px;font-weight:800;letter-spacing:1px;color:var(--txt3);margin-bottom:6px;text-transform:uppercase}
.agg-num{font-size:28px;font-weight:900;color:var(--txt);line-height:1;margin-bottom:2px}
.agg-total{font-size:11px;color:var(--txt3)}
/* PHASE */
.phase-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.phase-item:last-child{border-bottom:none}
.phase-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:5px}
.phase-dot.done{background:var(--p-lime)}
.phase-dot.active{background:var(--p-orange);box-shadow:0 0 8px var(--p-orange)}
.phase-dot.locked{background:var(--bg5);border:2px solid var(--border2)}
/* BADGE */
.badge{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:12px 6px;text-align:center}
.badge.unlocked{border-color:rgba(235,137,57,0.4);background:rgba(235,137,57,0.06)}
.badge-icon i{font-size:24px;color:var(--txt3);opacity:0.3}
.badge.unlocked .badge-icon i{color:var(--amber);opacity:1}
.badge-name{font-size:9px;font-weight:800;color:var(--txt2);text-transform:uppercase;letter-spacing:0.4px;margin-top:5px}
.badge-day{font-size:9px;color:var(--txt3);margin-top:1px}
/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .25s}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg3);border:1px solid var(--border2);border-radius:20px 20px 0 0;padding:20px;padding-bottom:max(20px,env(safe-area-inset-bottom));width:100%;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);max-height:85dvh;overflow-y:auto}
.overlay.open .modal{transform:translateY(0)}
.modal-handle{width:32px;height:3px;background:var(--bg5);border-radius:99px;margin:0 auto 16px}
/* BTN */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;border-radius:var(--r2);font-size:13px;font-weight:800;cursor:pointer;border:none;width:100%;transition:all .15s;letter-spacing:1px;text-transform:uppercase}
.btn:active{transform:scale(0.97)}
.btn-primary{background:var(--neon);color:#000}
.btn-danger{background:var(--redbg);border:1px solid var(--redborder);color:var(--red)}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--txt)}
.input{background:var(--bg4);border:1px solid var(--border2);border-radius:var(--r2);color:var(--txt);font-size:14px;padding:12px;width:100%;font-family:inherit;min-width:0}
input[type="date"].input{-webkit-appearance:none;appearance:none;max-width:100%}
.input:focus{outline:none;border-color:var(--neon)}
/* TAKE BTN */
.take-btn{background:var(--neon);color:#000;border:none;border-radius:var(--r2);padding:9px 14px;font-size:11px;font-weight:900;cursor:pointer;letter-spacing:1px;text-transform:uppercase;flex-shrink:0;transition:all .15s}
.take-btn:active{transform:scale(0.95)}
/* QUICK BTNS */
.quick-btns{display:flex;gap:6px}
.qbtn{flex:1;padding:10px 6px;border:1px solid var(--border2);background:var(--bg4);color:var(--txt2);border-radius:var(--r2);font-size:12px;font-weight:800;cursor:pointer;transition:all .15s;text-align:center}
.qbtn:active{transform:scale(0.95);background:var(--neonbg);color:var(--neon);border-color:var(--neonborder)}
/* LABEL */
.lbl{font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--txt3)}
/* SECTION HEAD */
.sec{font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--txt3);margin:18px 0 8px;display:flex;align-items:center;gap:6px}
.sec i{font-size:12px}
.sec:first-child{margin-top:0}
/* FAIL LINK */
.fail-link{display:flex;align-items:center;justify-content:center;gap:6px;color:var(--txt3);font-size:10px;font-weight:800;letter-spacing:1px;padding:14px;cursor:pointer;border:none;background:none;text-transform:uppercase;width:100%;margin-top:8px}
.fail-link:hover{color:var(--red)}
/* SEPARATOR */
.sep{height:1px;background:var(--border);margin:6px 0 16px}
/* PHOTO */
.photo-zone{border:1px dashed var(--border2);border-radius:var(--r);height:110px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;color:var(--txt3);transition:all .2s}
.photo-zone:hover{border-color:var(--neon);color:var(--neon)}
.photo-strip{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-top:8px}
.photo-thumb{width:72px;height:72px;border-radius:var(--r2);object-fit:cover;flex-shrink:0;border:1px solid var(--border)}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.1)}100%{transform:scale(1)}}
.pop{animation:pop .22s ease}
</style>
</head>
<body>
<div id="app">
<div id="pages">
  <div class="page active" id="p-today"><div class="page-inner" id="today-content"></div></div>
  <div class="page" id="p-progress"><div class="page-inner" id="progress-content"></div></div>
  <div class="page" id="p-stats"><div class="page-inner" id="stats-content"></div></div>
  <div class="page" id="p-photos"><div class="page-inner" id="photos-content"></div></div>
  <div class="page" id="p-settings"><div class="page-inner" id="settings-content"></div></div>
</div>
<nav id="nav">
  <button class="nav-btn active" data-page="today" onclick="nav('today')"><i class="ti ti-bolt"></i>Today</button>
  <button class="nav-btn" data-page="progress" onclick="nav('progress')"><i class="ti ti-chart-line"></i>Progress</button>
  <button class="nav-btn" data-page="stats" onclick="nav('stats')"><i class="ti ti-layout-grid"></i>Stats</button>
  <button class="nav-btn" data-page="photos" onclick="nav('photos')"><i class="ti ti-camera"></i>Photos</button>
  <button class="nav-btn" data-page="settings" onclick="nav('settings')"><i class="ti ti-settings"></i>Settings</button>
</nav>
</div>
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal"><div class="modal-handle"></div><div id="modal-body"></div></div>
</div>
<input type="file" id="photo-input" accept="image/*" capture="environment" style="display:none" onchange="handlePhoto(event)"/>

<script>
const STORAGE_KEY='75hard_v4';
// Diet + No Alcohol merged into one "Clean Eating" card (no cheat meals, no soda)
// Workout 1 = Indoor (45 min), Workout 2 = Outdoor
const TASKS=[
  {id:'diet', icon:'ti-salad',   name:'Clean Eating',   desc:'No cheat meals. No soda. Stick to your plan.',color:'#c0f631'},
  {id:'w1',   icon:'ti-barbell', name:'Workout 1',      desc:'Indoor — any exercise, min 45 min.',          color:'#c0f631', pill:'45 MIN', pillStyle:'neon', hasOutdoor:true},
  {id:'w2',   icon:'ti-run',     name:'Workout 2',      desc:'Outside only — walk, run, or train.',          color:'#1db588', pill:'OUTDOOR', pillStyle:'blue'},
  {id:'water',icon:'ti-droplet', name:'Drink Water',    desc:'4 litres. No exceptions.',                    color:'#1db588', isWater:true},
  {id:'read', icon:'ti-book-2',  name:'Read 10 Pages',  desc:'Non-fiction only. No audiobooks.',             color:'#c0f631'},
  {id:'photo',icon:'ti-camera',  name:'Progress Photo', desc:'Daily body photo. Document the change.',       color:'#eb8939', isPhoto:true},
];
const PHASES=[
  {n:1,name:'The Foundation', days:'1–7',  desc:'7 days of zero compromise.',         start:1,end:7},
  {n:2,name:'The Grind',      days:'8–21', desc:'Build momentum through resistance.',  start:8,end:21},
  {n:3,name:'The Crucible',   days:'22–40',desc:'When most people quit.',              start:22,end:40},
  {n:4,name:'The Forge',      days:'41–55',desc:'Identity transformation begins.',     start:41,end:55},
  {n:5,name:'The Champion',   days:'56–75',desc:'You are not who you were.',           start:56,end:75},
];

function def(){return{startDate:null,days:{},settings:{name:'Warrior'},consequences:[
  {id:'c1',text:'₹500 donation to a cause you dislike',icon:'ti-coin'},
  {id:'c2',text:'Extra 45 min outdoor run next day',icon:'ti-run'},
  {id:'c3',text:'No screen time after 8 PM for a week',icon:'ti-device-mobile-off'},
]};}

let S=(()=>{try{const d=JSON.parse(localStorage.getItem(STORAGE_KEY));return d||def();}catch{return def();}})();
function save(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(S));}catch{}}
function today(){return new Date().toISOString().slice(0,10);}
function dayNum(){if(!S.startDate)return 0;const d=Math.floor((new Date(today())-new Date(S.startDate))/86400000)+1;return Math.min(Math.max(d,1),75);}

function dayData(k){
  if(!S.days[k]||typeof S.days[k]!=='object')S.days[k]={tasks:{},water:0,pages:0,photos:[]};
  const dd=S.days[k];
  if(!dd.tasks||typeof dd.tasks!=='object')dd.tasks={};
  if(typeof dd.water!=='number')dd.water=0;
  if(typeof dd.pages!=='number')dd.pages=0;
  if(!Array.isArray(dd.photos))dd.photos=[];
  return dd;
}
function td(){return dayData(today());}

function taskDone(dd,t){
  if(!dd||!dd.tasks)return false;
  if(t.isWater)return(dd.water||0)>=4000;
  return!!dd.tasks[t.id];
}
function allDone(dd){return dd&&TASKS.every(t=>taskDone(dd,t));}
function countDone(dd){return TASKS.filter(t=>taskDone(dd,t)).length;}
function streak(){
  let s=0,d=new Date(today());
  for(;;){const k=d.toISOString().slice(0,10);const dd=S.days[k];if(!dd||!allDone(dd))break;s++;d.setDate(d.getDate()-1);}
  return s;
}
function daysLeft(){return Math.max(75-dayNum(),0);}

let curPage='today';
function nav(pg){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.page===pg));
  document.getElementById('p-'+pg).classList.add('active');
  curPage=pg;render[pg]();
}
function openModal(html){document.getElementById('modal-body').innerHTML=html;document.getElementById('overlay').classList.add('open');}
function closeModal(e){if(e.target===document.getElementById('overlay'))document.getElementById('overlay').classList.remove('open');}
function forceClose(){document.getElementById('overlay').classList.remove('open');}

const render={};

/* ── TODAY ── */
render.today=function(){
  const dd=td(),dn=dayNum(),str=streak(),done=countDone(dd);
  if(!S.startDate){
    document.getElementById('today-content').innerHTML=`
    <div style="text-align:center;padding:50px 0 32px">
      <div class="lbl" style="margin-bottom:10px">75 Hard Challenge</div>
      <div style="font-size:52px;font-weight:900;color:var(--neon);line-height:1;margin-bottom:10px">STAY<br>HARD.</div>
      <p style="font-size:13px;color:var(--txt2);margin-bottom:28px;line-height:1.7">No substitutions. No modifications.<br>No excuses. 75 days of discipline.</p>
      <div class="card" style="text-align:left;margin-bottom:16px">
        <div class="sec" style="margin-top:0">Your Name</div>
        <input class="input" id="uname" placeholder="Enter your name" value="${S.settings.name||''}"/>
        <div class="sec">Start Date</div>
        <input class="input" id="sdate" type="date" value="${today()}"/>
      </div>
      <button class="btn btn-primary" onclick="startChallenge()"><i class="ti ti-rocket"></i>Begin 75 Hard</button>
    </div>`;
    return;
  }

  const taskCards=TASKS.map(t=>{
    const done2=taskDone(dd,t),ts=dd.tasks[t.id];
    let pillHtml='';
    if(t.pill) pillHtml=`<span class="pill pill-${t.pillStyle}" style="margin-left:8px">${t.pill}</span>`;
    if(t.hasOutdoor){
      const io=!!dd.outdoor_w1;
      pillHtml+=`<button onclick="event.stopPropagation();toggleOutdoor('w1')" style="background:${io?'rgba(29,181,136,0.12)':'var(--bg4)'};border:1px solid ${io?'rgba(29,181,136,0.35)':'var(--border2)'};border-radius:6px;padding:3px 9px;cursor:pointer;font-size:10px;font-weight:800;color:${io?'#1db588':'var(--txt3)'};margin-left:6px;text-transform:uppercase;letter-spacing:0.5px;transition:all .15s">${io?'OUTDOOR':'INDOOR'}</button>`;
    }
    let rightEl='';
    if(t.isWater){
      const wl=(dd.water/1000).toFixed(1);
      rightEl=`<div style="font-size:11px;font-weight:900;color:#1db588;flex-shrink:0;min-width:40px;text-align:right">${wl}/4L</div>`;
    }
    if(t.isPhoto&&!done2) rightEl=`<button class="take-btn" onclick="event.stopPropagation();document.getElementById('photo-input').click()">TAKE</button>`;
    return `<div class="task-card ${done2?'done':''}" onclick="toggleTask('${t.id}')" id="task-${t.id}">
      <div class="task-chk">${done2?`<i class="ti ti-check"></i>`:''}</div>
      <i class="ti ${t.icon}" style="font-size:20px;color:${done2?'var(--neon)':t.color};flex-shrink:0;width:22px;text-align:center"></i>
      <div class="task-body">
        <div style="display:flex;align-items:center;flex-wrap:wrap;gap:2px">
          <span class="task-name">${t.name}</span>${pillHtml}
        </div>
        <div class="task-desc">${t.desc}</div>
        ${done2&&ts?`<div class="task-time"><i class="ti ti-check" style="font-size:10px"></i>${ts}</div>`:''}
      </div>
      ${rightEl}
    </div>`;
  }).join('');

  const totalPct=Math.round(dn/75*100);
  document.getElementById('today-content').innerHTML=`
  <div class="lbl" style="margin-bottom:6px">75 Hard Challenge</div>
  <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px">
    <div style="font-size:52px;font-weight:900;line-height:1;letter-spacing:-1px">DAY ${dn}</div>
    <div style="text-align:right;padding-top:4px">
      <div style="font-size:32px;font-weight:900;color:var(--neon);line-height:1;display:flex;align-items:center;gap:4px">
        <span style="color:var(--amber);font-size:26px">🔥</span>${str}
      </div>
      <div class="lbl" style="color:var(--txt3)">Streak</div>
    </div>
  </div>
  <div class="pbar-wrap" style="height:4px;margin-bottom:8px"><div class="pbar-fill" style="width:${totalPct}%"></div></div>
  <div style="display:flex;justify-content:space-between;margin-bottom:18px">
    <span class="lbl" style="color:var(--txt3)">${done} / ${TASKS.length} Complete</span>
    <span class="lbl" style="color:var(--txt3)">${daysLeft()} Days Left</span>
  </div>
  ${taskCards}
  <button class="fail-link" onclick="confirmReset()">
    <i class="ti ti-rotate" style="font-size:12px"></i>I Failed — Reset to Day 1
  </button>`;
};

/* ── PROGRESS ── */
render.progress=function(){
  const dn=dayNum(),str=streak(),keys=Object.keys(S.days).sort();
  const totalDays=keys.length;
  const perfDays=keys.filter(k=>{const dd=S.days[k];return dd&&allDone(dd);}).length;
  const donePct=Math.round(dn/75*100);
  const consistPct=totalDays>0?Math.round(perfDays/totalDays*100):0;

  // Wall cells (75, 8 cols)
  let wallHtml='';
  for(let i=1;i<=75;i++){
    let cls='wall-cell ';
    if(!S.startDate){cls+='future';wallHtml+=`<div class="${cls}"></div>`;continue;}
    const d=new Date(S.startDate);d.setDate(d.getDate()+i-1);

function startChallenge(){
  const name=document.getElementById('uname')?.value||'Warrior';
  const sdate=document.getElementById('sdate')?.value||today();
  S.settings.name=name;S.startDate=sdate;save();render.today();
}
function toggleTask(id){
  const dd=td();
  const t=TASKS.find(x=>x.id===id);
  if(t?.isWater){openWaterModal();return;}
  if(t?.isPhoto){document.getElementById('photo-input').click();return;}
  if(dd.tasks[id])delete dd.tasks[id];
  else dd.tasks[id]=new Date().toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'});
  save();
  const el=document.getElementById('task-'+id);
  if(el){el.classList.add('pop');setTimeout(()=>el.classList.remove('pop'),220);}
  render.today();
}
function toggleOutdoor(id){
  const dd=td();
  if(id==='w1')dd.outdoor_w1=!dd.outdoor_w1;
  save();render.today();
}
function openWaterModal(){
  const dd=td();
  openModal(`
  <div style="font-size:18px;font-weight:900;margin-bottom:4px;text-transform:uppercase">Water Intake</div>
  <div style="font-size:12px;color:var(--txt2);margin-bottom:16px">Target: 4 litres per day</div>
  <div style="text-align:center;padding:10px 0 16px">
    <div id="wb" style="font-size:48px;font-weight:900;color:#1db588">${(dd.water/1000).toFixed(1)}L</div>
    <div style="font-size:11px;color:var(--txt3);margin-bottom:10px">of 4L goal</div>
    <div style="background:var(--bg5);border-radius:99px;height:6px;overflow:hidden">
      <div id="wp" style="height:100%;border-radius:99px;background:#1db588;width:${Math.min(dd.water/4000*100,100)}%;transition:width .3s"></div>
    </div>
  </div>
  <div class="quick-btns" style="margin-bottom:8px">
    ${[200,300,500,750].map(ml=>`<button class="qbtn" onclick="addWaterM(${ml})">${ml}ml</button>`).join('')}
  </div>
  <button class="qbtn" style="width:100%;color:var(--red);border-color:var(--redborder);margin-bottom:12px" onclick="resetWaterM()">Reset to 0</button>
  <button class="btn btn-primary" onclick="forceClose()">Done</button>`);
}
function addWaterM(ml){
  const dd=td();dd.water=Math.min((dd.water||0)+ml,6000);
  if(dd.water>=4000&&!dd.tasks['water'])dd.tasks['water']=new Date().toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'});
  save();
  const wb=document.getElementById('wb'),wp=document.getElementById('wp');
  if(wb)wb.textContent=(dd.water/1000).toFixed(1)+'L';
  if(wp)wp.style.width=Math.min(dd.water/4000*100,100)+'%';
  if(curPage==='today')render.today();
}
function resetWaterM(){const dd=td();dd.water=0;delete dd.tasks['water'];save();forceClose();render.today();}
function handlePhoto(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const dd=td();dd.photos.push(ev.target.result);
    if(!dd.tasks['photo'])dd.tasks['photo']=new Date().toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'});
    save();showToast('Photo saved');
    if(curPage==='today')render.today();else if(curPage==='photos')render.photos();
  };
  reader.readAsDataURL(file);e.target.value='';
}
function showPhoto(src,k,dn2){
  openModal(`<div style="text-align:center">
    <div style="font-size:11px;font-weight:900;color:var(--neon);margin-bottom:8px;letter-spacing:1px">DAY ${dn2} · ${k}</div>
    <img src="${src}" style="width:100%;border-radius:var(--r);max-height:65dvh;object-fit:contain"/>
    <button class="btn btn-outline" style="margin-top:12px" onclick="forceClose()">Close</button>
  </div>`);
}
function confirmReset(){
  openModal(`<div style="text-align:center;padding:8px">
    <i class="ti ti-refresh" style="font-size:44px;color:var(--red);display:block;margin-bottom:10px"></i>
    <div style="font-size:18px;font-weight:900;color:var(--red);margin-bottom:8px">Reset to Day 1?</div>
    <p style="font-size:13px;color:var(--txt2);line-height:1.6;margin-bottom:16px">You're on Day ${dayNum()}. These consequences apply.</p>
    <div style="background:var(--redbg);border:1px solid var(--redborder);border-radius:var(--r);padding:12px;margin-bottom:16px;text-align:left">
      ${S.consequences.map(c=>`<div style="display:flex;gap:8px;align-items:center;padding:7px 0;border-bottom:1px solid rgba(235,137,57,0.1);font-size:12px"><i class="ti ${c.icon}" style="color:var(--red)"></i><span style="color:var(--txt2)">${c.text}</span></div>`).join('')}
    </div>
    <button class="btn btn-danger" style="margin-bottom:8px" onclick="doReset()"><i class="ti ti-refresh"></i>I Accept — Restart</button>
    <button class="btn btn-outline" onclick="forceClose()">Continue Challenge</button>
  </div>`);
}
function doReset(){S.startDate=today();S.days={};save();forceClose();showToast('Restarted. Honor your consequences.');render.today();}
function confirmWipe(){
  openModal(`<div style="text-align:center;padding:8px">
    <i class="ti ti-trash" style="font-size:44px;color:var(--red);display:block;margin-bottom:10px"></i>
    <div style="font-size:18px;font-weight:900;color:var(--red);margin-bottom:8px">Erase All Data?</div>
    <p style="color:var(--txt2);margin-bottom:16px;font-size:13px">This cannot be undone.</p>
    <button class="btn btn-danger" style="margin-bottom:8px" onclick="doWipe()"><i class="ti ti-trash"></i>Delete Everything</button>
    <button class="btn btn-outline" onclick="forceClose()">Cancel</button>
  </div>`);
}
function doWipe(){S=def();save();forceClose();render.today();}
function editConsequence(i){
  const c=S.consequences[i];
  openModal(`<div style="font-size:16px;font-weight:900;margin-bottom:12px;text-transform:uppercase">Edit Consequence</div>
  <div style="margin-bottom:10px"><div class="lbl" style="margin-bottom:6px">Icon (e.g. ti-coin)</div>
  <input class="input" id="ci" value="${c.icon}"/></div>
  <div style="margin-bottom:16px"><div class="lbl" style="margin-bottom:6px">Description</div>
  <input class="input" id="ct" value="${c.text}"/></div>
  <button class="btn btn-primary" onclick="saveConsequence(${i})"><i class="ti ti-device-floppy"></i>Save</button>
  <button class="btn btn-danger" style="margin-top:8px" onclick="deleteConsequence(${i})"><i class="ti ti-trash"></i>Delete</button>
  <button class="btn btn-outline" style="margin-top:8px" onclick="forceClose()">Cancel</button>`);
}
function saveConsequence(i){S.consequences[i].icon=document.getElementById('ci').value;S.consequences[i].text=document.getElementById('ct').value;save();forceClose();render.settings();}
function deleteConsequence(i){S.consequences.splice(i,1);save();forceClose();render.settings();}
function addConsequence(){S.consequences.push({id:'c'+Date.now(),text:'New consequence',icon:'ti-alert-circle'});save();render.settings();editConsequence(S.consequences.length-1);}

function getToken(){if(!S._token){S._token='75H-'+Math.random().toString(36).slice(2,10).toUpperCase();save();}return S._token;}
function copyCmd(){navigator.clipboard?.writeText('/start '+getToken()).then(()=>showToast('Command copied'));}

let toastT;
function showToast(msg){
  let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';
  t.style.cssText='position:fixed;bottom:calc(env(safe-area-inset-bottom) + 80px);left:50%;transform:translateX(-50%) translateY(10px);background:var(--bg4);border:1px solid var(--neonborder);color:var(--neon);padding:10px 20px;border-radius:99px;font-size:11px;font-weight:900;z-index:300;transition:all .25s;opacity:0;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center;letter-spacing:1px;text-transform:uppercase';
  document.body.appendChild(t);}
  t.textContent=msg;clearTimeout(toastT);
  requestAnimationFrame(()=>{t.style.opacity='1';t.style.transform='translateX(-50%) translateY(0)';});
  toastT=setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(-50%) translateY(10px)';},2500);
}
render.today();
</script>
</body>
</html>
